<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>百年盲盒对话 · 1919 ↔ 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --wx-green:#07C160;--wx-dark:#1A1A1A;--wx-bg:#EDEDED;
  --wx-card:#FFF;--wx-text:#111;--wx-sub:#888;
  --wx-border:#E5E5E5;--wx-red:#FA5151;--wx-orange:#FF9800;
  --sepia:#F5F0E8;--ink:#2C1810;--aged:#8B7355;
  --gold:#C9A96E;--crimson:#B22222;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:var(--wx-bg);color:var(--wx-text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.hidden{display:none!important}
.page{min-height:calc(100vh - 56px - 60px);padding:12px;padding-bottom:80px;animation:pageIn .4s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(201,169,110,.3)}50%{box-shadow:0 0 40px rgba(201,169,110,.6)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes stampIn{0%{transform:scale(3) rotate(-30deg);opacity:0}60%{transform:scale(.9) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes likePop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}

/* Splash */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(160deg,#0d0500 0%,#2C1810 40%,#4a2c1a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s,transform .8s;
}
#splash.fade-out{opacity:0;transform:scale(1.15)}
.splash-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.splash-particle{
  position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;
  animation:float 3s ease-in-out infinite;opacity:.4;
}
.splash-year{
  font-size:clamp(56px,14vw,96px);font-weight:900;
  background:linear-gradient(135deg,var(--gold),#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:12px;margin-bottom:4px;position:relative;z-index:1;
  text-shadow:0 0 60px rgba(201,169,110,.3);
}
.splash-vs{
  font-size:14px;color:rgba(201,169,110,.5);letter-spacing:8px;margin-bottom:4px;
}
.splash-year2{
  font-size:clamp(28px,7vw,48px);font-weight:700;
  background:linear-gradient(135deg,var(--wx-green),#8f8,var(--wx-green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:6px;margin-bottom:24px;
}
.splash-sub{color:var(--gold);font-size:clamp(14px,3.5vw,18px);letter-spacing:8px;opacity:.7;margin-bottom:48px;position:relative;z-index:1}
.splash-desc{color:rgba(255,255,255,.35);font-size:13px;margin-bottom:40px;text-align:center;line-height:1.8;position:relative;z-index:1}
.splash-enter{
  padding:16px 56px;border:2px solid var(--gold);background:transparent;
  color:var(--gold);font-size:18px;border-radius:30px;cursor:pointer;
  letter-spacing:4px;transition:all .3s;position:relative;z-index:1;
  animation:glow 2s ease-in-out infinite;
}
.splash-enter:hover{background:var(--gold);color:#1a0a00}
.splash-stats{
  position:absolute;bottom:40px;display:flex;gap:32px;z-index:1;
}
.splash-stat{text-align:center;color:rgba(255,255,255,.3)}
.splash-stat-num{font-size:20px;font-weight:700;color:var(--gold)}
.splash-stat-label{font-size:11px;margin-top:2px}

/* Nav Bar */
.nav-bar{
  position:sticky;top:0;z-index:100;background:var(--wx-dark);color:#fff;
  padding:env(safe-area-inset-top,12px) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;min-height:56px;
}
.nav-bar h1{font-size:17px;font-weight:600;flex:1;text-align:center}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;border:none;background:none;color:#fff}
.nav-action{font-size:14px;color:var(--wx-green);cursor:pointer;border:none;background:none}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--wx-card);border-top:1px solid var(--wx-border);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,8px);
}
.nav-item{flex:1;text-align:center;padding:6px 0;cursor:pointer;color:var(--wx-sub);font-size:10px;transition:color .2s}
.nav-item.active{color:var(--wx-green)}
.nav-item .nav-icon{font-size:22px;display:block;margin-bottom:2px}

/* Home */
.home-hero{
  background:linear-gradient(135deg,var(--ink),#4a2c1a);
  border-radius:20px;padding:36px 20px;text-align:center;color:#fff;
  margin-bottom:16px;position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23C9A96E' stroke-width='.3' opacity='.12'/%3E%3C/svg%3E");
}
.home-hero>*{position:relative}
.home-hero h2{font-size:26px;font-weight:800;margin-bottom:6px;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{font-size:13px;opacity:.6;line-height:1.7}
.open-box{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:20px;padding:15px 44px;
  background:linear-gradient(135deg,var(--crimson),#D44);
  border:none;border-radius:30px;color:#fff;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 24px rgba(178,34,34,.4);transition:all .2s;
}
.open-box:active{transform:scale(.94)}
.open-box .box-icon{font-size:22px;animation:shake 2s ease-in-out infinite}

/* Stats */
.stats-bar{display:flex;gap:10px;margin-bottom:16px}
.stat-card{flex:1;background:var(--wx-card);border-radius:14px;padding:14px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:var(--crimson)}
.stat-label{font-size:11px;color:var(--wx-sub);margin-top:3px}

/* Section */
.section-title{font-size:16px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px}

/* Leader Card */
.leader-card{
  background:var(--wx-card);border-radius:14px;padding:14px;
  margin-bottom:10px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .15s;
}
.leader-card:active{transform:scale(.97)}
.leader-rank{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;flex-shrink:0;
}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA000)}
.rank-2{background:linear-gradient(135deg,#C0C0C0,#999)}
.rank-3{background:linear-gradient(135deg,#CD7F32,#A0522D)}
.rank-other{background:#E5E5E5;color:#999}
.leader-info{flex:1;min-width:0}
.leader-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leader-meta{font-size:12px;color:var(--wx-sub);margin-top:3px}
.leader-likes{display:flex;align-items:center;gap:4px;color:var(--wx-red);font-size:14px;font-weight:700}
.leader-avatar{font-size:28px;flex-shrink:0}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
.badge-hot{background:rgba(250,81,81,.1);color:var(--wx-red)}
.badge-new{background:rgba(7,193,96,.1);color:var(--wx-green)}
.badge-first{background:rgba(255,152,0,.1);color:var(--wx-orange)}

/* Identity Card */
.identity-card{
  background:var(--sepia);border-radius:18px;padding:28px 24px;
  margin-bottom:20px;position:relative;
  border:1px solid rgba(139,115,85,.15);animation:scaleIn .5s ease;
  box-shadow:0 8px 32px rgba(0,0,0,.08);
}
.identity-card::before{
  content:'民國八年';position:absolute;top:14px;right:18px;
  font-size:11px;color:var(--aged);letter-spacing:4px;opacity:.5;
}
.identity-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),transparent);border-radius:18px 18px 0 0;
}
.avatar-circle{
  width:80px;height:80px;border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;border:3px solid var(--gold);
  background:linear-gradient(135deg,#f5e6d3,#e8d5b8);
  animation:pulse 3s ease-in-out infinite;
}
.id-name{text-align:center;font-size:24px;font-weight:800;color:var(--ink);margin-bottom:4px}
.id-role{text-align:center;font-size:13px;color:var(--aged);margin-bottom:20px;letter-spacing:3px}
.id-stats{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.id-stat{text-align:center}
.id-stat-val{font-size:18px;font-weight:700;color:var(--ink)}
.id-stat-lbl{font-size:11px;color:var(--aged)}
.id-bio{font-size:14px;line-height:2;color:var(--ink);border-top:1px dashed var(--aged);padding-top:16px;text-indent:2em}
.id-era{
  position:absolute;bottom:16px;right:18px;
  font-size:11px;color:var(--aged);opacity:.4;
}

/* Dilemma */
.dilemma-header{
  background:linear-gradient(135deg,var(--ink),#3a2015);
  border-radius:18px;padding:24px;color:#fff;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.dilemma-header::after{
  content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;
  background:rgba(201,169,110,.08);border-radius:50%;
}
.dilemma-tag{
  display:inline-block;padding:4px 14px;border-radius:12px;
  background:rgba(201,169,110,.2);color:var(--gold);
  font-size:12px;margin-bottom:12px;letter-spacing:2px;
}
.dilemma-title{font-size:18px;font-weight:700;line-height:1.6}
.dilemma-date{font-size:13px;opacity:.5;margin-top:10px}

/* Chat bubble style letter */
.chat-container{
  background:var(--wx-bg);border-radius:14px;padding:16px;
  margin-bottom:16px;
}
.chat-bubble{
  max-width:82%;padding:14px 16px;border-radius:14px;
  margin-bottom:12px;position:relative;font-size:15px;line-height:1.8;
  animation:slideUp .5s ease;
}
.chat-bubble.left{
  background:var(--wx-card);margin-right:auto;
  border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.chat-bubble.right{
  background:#95EC69;margin-left:auto;
  border-bottom-right-radius:4px;
}
.chat-time{text-align:center;font-size:11px;color:var(--wx-sub);margin:8px 0}
.chat-avatar-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.chat-avatar{font-size:28px;flex-shrink:0}
.chat-sender{font-size:12px;color:var(--wx-sub);margin-bottom:4px}
.chat-bubble .letter-sig{
  font-size:13px;color:var(--aged);text-align:right;margin-top:8px;font-style:italic;
}

/* Letter box (classic) */
.letter-box{
  background:var(--sepia);border-radius:14px;padding:22px;
  margin-bottom:20px;position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,.08);animation:slideUp .6s ease;
}
.letter-box::before{
  content:'📩 来信';position:absolute;top:-12px;left:20px;
  background:var(--gold);color:#fff;font-size:12px;
  padding:3px 14px;border-radius:10px;font-weight:600;
}
.letter-stamp{
  position:absolute;top:12px;right:16px;width:48px;height:56px;
  border:2px solid var(--crimson);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;opacity:.3;transform:rotate(8deg);
}
.letter-from{font-size:13px;color:var(--aged);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.letter-body{
  font-size:15px;line-height:2.2;color:var(--ink);
  font-family:"KaiTi","STKaiti",serif;text-indent:2em;
}
.letter-sig{text-align:right;margin-top:12px;font-size:14px;color:var(--aged);font-style:italic}

/* Choices */
.choices{margin-bottom:20px}
.choice-item{
  background:var(--wx-card);border:2px solid var(--wx-border);
  border-radius:14px;padding:16px;margin-bottom:10px;
  cursor:pointer;transition:all .25s;display:flex;gap:12px;align-items:flex-start;
}
.choice-item:active{transform:scale(.97)}
.choice-item.selected{border-color:var(--wx-green);background:rgba(7,193,96,.04)}
.choice-item.historical{border-color:var(--gold);background:rgba(201,169,110,.04)}
.choice-label{
  width:30px;height:30px;border-radius:50%;
  background:var(--wx-bg);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;color:var(--wx-sub);
}
.choice-item.selected .choice-label{background:var(--wx-green);color:#fff}
.choice-item.historical .choice-label{background:var(--gold);color:#fff}
.choice-text{font-size:15px;line-height:1.6;flex:1}
.choice-result{
  font-size:13px;color:var(--aged);margin-top:8px;
  padding-top:8px;border-top:1px dashed var(--wx-border);display:none;
  line-height:1.7;
}
.choice-item.selected .choice-result,.choice-item.historical .choice-result{display:block}

/* Reply */
.reply-section{background:var(--wx-card);border-radius:18px;padding:22px;margin-bottom:20px}
.reply-label{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.reply-hint{font-size:12px;color:var(--wx-sub);margin-bottom:14px;line-height:1.6}
.reply-textarea{
  width:100%;min-height:150px;border:2px solid var(--wx-border);
  border-radius:12px;padding:14px;font-size:15px;line-height:1.8;
  resize:vertical;font-family:inherit;transition:border-color .2s;
}
.reply-textarea:focus{outline:none;border-color:var(--wx-green)}
.reply-toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.reply-tool{
  padding:8px 14px;border:1px solid var(--wx-border);border-radius:20px;
  background:var(--wx-card);font-size:12px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:4px;
}
.reply-tool:active{background:var(--wx-bg)}
.reply-actions{display:flex;gap:10px;margin-top:16px}

/* Buttons */
.btn-primary{
  flex:1;padding:15px;background:var(--wx-green);color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-primary:active{opacity:.8;transform:scale(.97)}
.btn-secondary{
  padding:15px 20px;background:var(--wx-bg);color:var(--wx-text);
  border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;
}
.btn-outline{
  padding:15px 20px;background:transparent;color:var(--wx-green);
  border:2px solid var(--wx-green);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;
}

/* Poster */
.poster-wrap{background:var(--wx-card);border-radius:18px;padding:20px;margin-bottom:16px}
#posterCanvas{width:100%;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.15)}
.poster-actions{display:flex;gap:10px;margin-top:16px}
.poster-actions button{
  flex:1;padding:12px;border:none;border-radius:12px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;
}
.poster-actions button:active{transform:scale(.96)}
.save-btn{background:var(--wx-green);color:#fff}
.share-btn{background:var(--wx-bg);color:var(--wx-text)}
.poster-style-row{display:flex;gap:8px;margin-bottom:16px}
.poster-style-btn{
  flex:1;padding:10px 8px;border:2px solid var(--wx-border);border-radius:10px;
  background:var(--wx-card);font-size:12px;text-align:center;cursor:pointer;
  transition:all .2s;
}
.poster-style-btn.active{border-color:var(--gold);background:rgba(201,169,110,.06)}

/* Like */
.like-section{text-align:center;padding:24px;background:var(--wx-card);border-radius:18px;margin-bottom:16px}
.like-btn{
  width:68px;height:68px;border-radius:50%;border:2px solid var(--wx-red);
  background:transparent;font-size:30px;cursor:pointer;
  transition:all .3s;display:inline-flex;align-items:center;justify-content:center;
}
.like-btn.liked{background:var(--wx-red);color:#fff;animation:likePop .4s ease}
.like-count{font-size:14px;color:var(--wx-sub);margin-top:10px;font-weight:600}

/* QR */
.qr-section{background:var(--wx-card);border-radius:18px;padding:24px;text-align:center;margin-bottom:16px}
.qr-section canvas{margin:12px auto;display:block}
.qr-section p{font-size:13px;color:var(--wx-sub);margin-top:8px}

/* Achievement Toast */
.achievement{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;
  background:linear-gradient(135deg,#2C1810,#4a2c1a);color:var(--gold);
  padding:14px 24px;border-radius:14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);animation:slideUp .5s ease;
  border:1px solid rgba(201,169,110,.3);font-size:14px;font-weight:600;
}
.achievement .ach-icon{font-size:28px}

/* Toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.8);color:#fff;padding:16px 28px;
  border-radius:12px;font-size:15px;z-index:9999;
  animation:scaleIn .3s ease;
}

/* Timeline Page */
.timeline-page{padding:0 12px}
.timeline-line{
  position:relative;padding-left:32px;
}
.timeline-line::before{
  content:'';position:absolute;left:12px;top:0;bottom:0;width:2px;
  background:linear-gradient(var(--gold),var(--wx-green));
}
.tl-item{position:relative;margin-bottom:24px;animation:slideUp .5s ease}
.tl-dot{
  position:absolute;left:-26px;top:4px;width:14px;height:14px;
  border-radius:50%;border:3px solid var(--gold);background:var(--wx-card);
}
.tl-dot.now{border-color:var(--wx-green)}
.tl-year{font-size:13px;color:var(--aged);font-weight:700;margin-bottom:4px}
.tl-title{font-size:15px;font-weight:600;margin-bottom:4px}
.tl-desc{font-size:13px;color:var(--wx-sub);line-height:1.6}

/* Achievements Page */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ach-card{
  background:var(--wx-card);border-radius:14px;padding:16px 8px;text-align:center;
  opacity:.3;transition:all .3s;
}
.ach-card.unlocked{opacity:1;box-shadow:0 2px 12px rgba(201,169,110,.15)}
.ach-icon{font-size:32px;margin-bottom:6px}
.ach-name{font-size:12px;font-weight:600}
.ach-desc{font-size:10px;color:var(--wx-sub);margin-top:2px}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.modal-sheet{
  background:var(--wx-card);border-radius:20px 20px 0 0;
  width:100%;max-width:500px;max-height:80vh;overflow-y:auto;
  padding:24px;animation:slideUp .3s ease;
}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}

/* Suggest card */
.suggest-card{
  background:linear-gradient(135deg,rgba(7,193,96,.05),rgba(7,193,96,.02));
  border:1px solid rgba(7,193,96,.2);border-radius:12px;padding:14px;
  margin-bottom:12px;cursor:pointer;transition:all .2s;
}
.suggest-card:active{transform:scale(.97)}
.suggest-label{font-size:12px;color:var(--wx-green);font-weight:700;margin-bottom:4px}
.suggest-text{font-size:14px;line-height:1.6;color:var(--wx-text)}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--wx-sub)}
.empty-icon{font-size:48px;margin-bottom:12px}

// ===== API LAYER =====
async function apiCall(path, opts = {}) {
  if (!ENABLE_API) return null;
  try {
    const res = await fetch(API_BASE + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
    });
    return await res.json();
  } catch (e) {
    console.warn('API 调用失败，使用本地数据:', e.message);
    return null;
  }
}

async function apiSaveDialogue(d) {
  const result = await apiCall('/api/dialogues', {
    method: 'POST',
    body: JSON.stringify({
      identityId: d.identityId,
      identityName: d.identityName,
      identityRole: d.identityRole,
      identityAvatar: d.identityAvatar,
      identityEra: d.identityEra,
      dilemmaTag: d.dilemmaTag,
      dilemmaTitle: d.dilemmaTitle,
      dilemmaLetter: d.dilemmaLetter,
      choiceIndex: d.choiceIndex,
      choiceLabel: d.choiceLabel,
      choiceText: d.choiceText,
      choiceResult: d.choiceResult,
      replyText: d.replyText,
    }),
  });
  if (result?.success) {
    // 用服务端 ID 替换本地 ID
    d.serverId = result.data.id;
  }
  return result;
}

async function apiLike(id) {
  const serverId = dialogues.find(d => d.id === id)?.serverId || id;
  return await apiCall(`/api/dialogues/${serverId}/like`, { method: 'POST' });
}

// ===== SSE 实时连接 =====
function connectSSE() {
  if (!ENABLE_API || eventSource) return;
  try {
    eventSource = new EventSource(API_BASE + '/api/events');
    eventSource.addEventListener('stats', e => {
      try {
        const data = JSON.parse(e.data);
        globalStats = data;
        const onlineEl = document.getElementById('onlineCount');
        if (onlineEl) onlineEl.textContent = data.onlineClients;
      } catch (err) {}
    });
    eventSource.addEventListener('new-dialogue', e => {
      try {
        const data = JSON.parse(e.data);
        toast(`${data.identityAvatar} 新的跨时空对话！`);
      } catch (err) {}
    });
    eventSource.addEventListener('like', e => {
      try {
        const data = JSON.parse(e.data);
        const el = document.getElementById('likeCount_' + data.id);
        if (el) el.textContent = data.likeCount + ' 人点赞';
      } catch (err) {}
    });
    eventSource.onerror = () => {
      try{eventSource.close()}catch(e){}
      eventSource = null;
      setTimeout(() => { try{connectSSE()}catch(e){} }, 10000);
    };
  } catch (e) { eventSource = null; }
}

// ===== AUDIO =====
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function playTone(freq,dur,type='sine',vol=.1){
  try{
    if(!audioCtx)audioCtx=new AudioCtx();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxOpen(){playTone(523,.15);setTimeout(()=>playTone(659,.15),100);setTimeout(()=>playTone(784,.2),200)}
function sfxClick(){playTone(880,.08,'sine',.05)}
function sfxLike(){playTone(523,.1);setTimeout(()=>playTone(784,.15),80);setTimeout(()=>playTone(1047,.2),160)}
function sfxAchievement(){playTone(523,.12);setTimeout(()=>playTone(659,.12),100);setTimeout(()=>playTone(784,.12),200);setTimeout(()=>playTone(1047,.25),300)}

async function loadLeaderboard(){
  const remote=await apiFetchLeaderboard();

    const ts=d.createdAt?new Date(d.createdAt).toLocaleDateString('zh-CN'):'';
    return `<div class="leader-card" onclick="viewRemoteDialogue('${d.id}')">

function viewRemoteDialogue(serverId){
  // 从本地找，找不到就用 API
  const local=dialogues.find(d=>d.serverId===serverId);

  apiCall(`/api/dialogues/${serverId}`).then(r=>{

function wrapText(ctx,text,x,y,maxW,lineH){
  const chars=text.split('');let line='',lines=0;
  for(const ch of chars){
    const test=line+ch;
    if(ctx.measureText(test).width>maxW){ctx.fillText(line,x,y+lines*lineH);line=ch;lines++}
    else line=test;
  }
  if(line){ctx.fillText(line,x,y+lines*lineH);lines++}
  return lines;
}

// ===== QR CODE =====
function drawQR(){
  const canvas=$('qrCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const S=200;

  // 尝试使用服务端 QR（真实二维码）
  const d=dialogues[0];
  const qrUrl = d?.serverId
    ? `${API_BASE}/api/qr/${d.serverId}?size=${S*2}`
    : `${API_BASE}/api/qr?text=${encodeURIComponent(location.origin)}&size=${S*2}`;

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{ctx.drawImage(img,0,0,S,S)};
  img.onerror=()=>{
    // Fallback: 本地装饰性图案
    drawQR_fallback(ctx,S);
  };
  img.src=qrUrl;
}
function drawQR_fallback(ctx,S){
  const N=25,cell=(S-40)/N,off=20;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,S,S);
  let seed=0;const url=location.origin;
  for(let i=0;i<url.length;i++)seed=((seed<<5)-seed)+url.charCodeAt(i);
  ctx.fillStyle='#1a0a00';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const inCorner=(r<7&&c<7)||(r<7&&c>=N-7)||(r>=N-7&&c<7);
    let fill=false;
    if(inCorner){
      const dr=r<7?r:r-(N-7),dc=c<7?c:c-(N-7);
      fill=dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4);
    }else{
      const h=Math.abs((r*N+c+seed)*2654435761);fill=(h%3)!==0;
    }
    if(fill)ctx.fillRect(off+c*cell,off+r*cell,cell-.5,cell-.5);
  }
  ctx.fillStyle='#fff';ctx.fillRect(S/2-22,S/2-22,44,44);
  ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#1a0a00';ctx.fillText('1919',S/2,S/2);
  ctx.strokeStyle='#1a0a00';ctx.lineWidth=2;ctx.strokeRect(S/2-24,S/2-24,48,48);
}

      const ts=d.createdAt?new Date(d.createdAt).toLocaleDateString('zh-CN'):'';
      return `<div class="leader-card" onclick="viewRemoteDialogue('${d.id}')">
        <div class="leader-rank ${rc}">${i+1}</div>
        <div class="leader-avatar">${d.identityAvatar||'📖'}</div>
        <div class="leader-info">
          <div class="leader-name">${d.identityName||'匿名'}·${d.identityRole||''}${badge}</div>
          <div class="leader-meta">${ts}</div>
          <div class="leader-meta" style="color:#333;margin-top:2px">${(d.replyText||'').slice(0,40)}…</div>
        </div>
        <div class="leader-likes">❤️ ${lk}</div>
      </div>`;
    }).join('');
  } else {
    // fallback 本地数据
    const sorted=[...dialogues].sort((a,b)=>(likes[b.id]||0)-(likes[a.id]||0));
    if(sorted.length){
      list.innerHTML=sorted.map((d,i)=>{
        const lk=likes[d.id]||0;
        const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
        return `<div class="leader-card" onclick="viewDialogue('${d.id}')">
          <div class="leader-rank ${rc}">${i+1}</div>
          <div class="leader-avatar">${d.identityAvatar}</div>
          <div class="leader-info">
            <div class="leader-name">${d.identityName}·${d.identityRole}</div>
            <div class="leader-meta">${d.timestamp}</div>
            <div class="leader-meta" style="color:#333;margin-top:2px">${d.replyText.slice(0,40)}…</div>
          </div>
          <div class="leader-likes">❤️ ${lk}</div>
        </div>`;
      }).join('');
    } else {
      list.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">还没有排行榜数据</div></div>';
    }
  }
}

function viewDialogue(id){
  const d=dialogues.find(x=>x.id===id);if(!d)return;
  currentIdentity=IDENTITIES.find(x=>x.id===d.identityId);
  currentDilemma=currentIdentity?.dilemma;
  selectedChoice=d.choiceIndex;userReply=d.replyText;
  renderResult(d);
}

  navigateTo('timeline');
  const events=[
    {year:'1915',title:'《新青年》创刊',desc:'陈独秀在上海创办《青年杂志》（后改名《新青年》），举起"民主"与"科学"两面大旗。',dot:''},

    {year:'1919.1',title:'巴黎和会召开',desc:'中国作为战胜国参加巴黎和会，却遭遇外交失败，山东权益将被转让给日本。',dot:''},
    {year:'1919.5.4',title:'五四运动爆发',desc:'北京3000余名学生走上街头，高呼"外争主权，内除国贼"，五四运动爆发。',dot:'',highlight:true},
    {year:'1919.6',title:'六三运动',desc:'上海工人开始大规模罢工，工人阶级首次以独立姿态登上政治舞台。',dot:''},
    {year:'1919.7',title:'《湘江评论》创刊',desc:'毛泽东在长沙创办《湘江评论》，以白话文宣传新思想。',dot:''},
    {year:'1921',title:'中国共产党成立',desc:'五四运动中成长起来的先进分子，在上海成立了中国共产党。',dot:''},
    {year:'2026',title:'你的回信',desc:'百年之后，你以2026年的视角，给那个时代的人写了一封信。',dot:'',now:true},
  ];
  // Insert user dialogues into timeline
  dialogues.slice(0,3).forEach(d=>{
    events.splice(events.length-1,0,{
      year:d.timestamp.split(' ')[0]||'2026',
      title:`给${d.identityName}的回信`,
      desc:d.replyText.slice(0,60)+'…',
      now:true
    });
  });

  $('pageTimeline').innerHTML=`
    <div class="section-title">📜 历史时间线</div>
    <p style="font-size:12px;color:var(--wx-sub);margin-bottom:16px">从新文化运动到百年后的对话</p>
    <div class="timeline-line">
      ${events.map((e,i)=>`
        <div class="tl-item" style="animation-delay:${i*.1}s">
          <div class="tl-dot ${e.now?'now':''}"></div>
          <div class="tl-year">${e.year}</div>
          <div class="tl-title">${e.title}</div>
          <div class="tl-desc">${e.desc}</div>
        </div>
      `).join('')}
    </div>
    <div style="height:80px"></div>
  `;
}
